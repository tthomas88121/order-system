<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代揚有限公司 | 訂單系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
        }

        body {
    min-height: 100vh;
    background: url("{{ url_for('static', filename='images/siko-bg.png') }}") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 16px;
}

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .left-panel {
    background: transparent;   /* 🔥 key fix */
    padding: 20px;
}

.left-panel h1 {
    color: #111111;
    font-weight: 800;
    font-size: 42px;
}

.left-panel p {
    color: #333333;
    font-size: 16px;
    margin-top: 12px;
    line-height: 1.6;
}

       .form-card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

        .form-card h2 {
            color: #0b4f94;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtext {
            color: #6d8092;
            margin-bottom: 24px;
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #18456f;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d7e2ee;
            border-radius: 12px;
            font-size: 15px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .submit-wrap {
            margin-top: 22px;
            text-align: right;
        }

        .submit-btn {
            border: none;
            border-radius: 12px;
            padding: 13px 24px;
            background: #0b66c3;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .left-panel h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>智慧訂單管理系統</h1>
            <p>
                請先選擇產品分類，再選擇對應料號，完成基本訂單資訊填寫。
            </p>
        </div>

        <div class="form-card">
            <h2>建立訂單</h2>
            <div class="subtext">請填寫以下資訊，送出後系統將自動儲存。</div>

            <form method="POST" action="/submit-order">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="customer_name">客戶姓名</label>
                        <input type="text" id="customer_name" name="customer_name" required>
                    </div>

                    <div class="form-group">
                        <label for="company_name">公司名稱</label>
                        <input type="text" id="company_name" name="company_name">
                    </div>

                    <div class="form-group">
                        <label for="phone">聯絡電話</label>
                        <input type="text" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="email">電子郵件</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="form-group">
                        <label for="category">產品分類</label>
                        <select id="category" name="category" required>
                            <option value="">請選擇分類</option>
                            {% for category in product_categories.keys() %}
                            <option value="{{ category }}">{{ category }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="part_number">產品料號</label>
                        <select id="part_number" name="part_number" required>
                            <option value="">請先選擇分類</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label for="quantity">數量</label>
                        <input type="number" id="quantity" name="quantity" min="1" required>
                    </div>

                    <div class="form-group full">
                        <label for="note">備註需求</label>
                        <textarea id="note" name="note"></textarea>
                    </div>
                </div>

                <div class="submit-wrap">
                    <button type="submit" class="submit-btn">送出訂單</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const categoryData = {{ product_categories | tojson }};

        const categorySelect = document.getElementById("category");
        const partNumberSelect = document.getElementById("part_number");

        categorySelect.addEventListener("change", function () {
            const selectedCategory = this.value;

            partNumberSelect.innerHTML = '<option value="">請選擇料號</option>';

            if (categoryData[selectedCategory]) {
                categoryData[selectedCategory].forEach(function(part) {
                    const option = document.createElement("option");
                    option.value = part;
                    option.textContent = part;
                    partNumberSelect.appendChild(option);
                });
            } else {
                partNumberSelect.innerHTML = '<option value="">請先選擇分類</option>';
            }
        });
    </script>
</body>
</html>
